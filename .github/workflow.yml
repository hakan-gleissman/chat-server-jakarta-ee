# syntax=docker/dockerfile:1

########## BUILD STAGE ##########
FROM maven:3.9.9-eclipse-temurin-21 AS build
WORKDIR /app

COPY pom.xml .
RUN mvn -B -q -DskipTests dependency:go-offline

COPY src ./src
RUN mvn -B -DskipTests package
  
  
  ########## RUNTIME STAGE ##########
FROM ghcr.io/eclipse-ee4j/glassfish:7.1.0
  
  # Deploy WAR (context root blir chatserver)
COPY --from=build /app/target/demo-jakarta-facelets-2026-1.0-SNAPSHOT.war \
/opt/glassfish/glassfish/domains/domain1/autodeploy/chatserver.war
  
  # Startscript som patchar domain.xml före start (snabbt nog för Render)
RUN set -eux; \
cat > /start.sh <<'EOF' \
  #!/usr/bin/env sh
set -e

PORT="${PORT:-8080}"
echo "Render PORT=${PORT}"

DOMAIN_XML="/opt/glassfish7/glassfish/domains/domain1/config/domain.xml"
  
  # Sätt port på båda vanliga HTTP listeners (i vissa images är 8181 http-listener-2)
sed -i "s/network-listener name=\"http-listener-1\" port=\"[0-9]\\+\"/network-listener name=\"http-listener-1\" port=\"${PORT}\"/g" "$DOMAIN_XML" || true
sed -i "s/network-listener name=\"http-listener-2\" port=\"[0-9]\\+\"/network-listener name=\"http-listener-2\" port=\"${PORT}\"/g" "$DOMAIN_XML" || true
  
  # Försök binda till alla interfaces (om address-attribut saknas gör detta ingen skada)
sed -i "s/network-listener name=\"http-listener-1\" /network-listener name=\"http-listener-1\" address=\"0.0.0.0\" /" "$DOMAIN_XML" || true
sed -i "s/network-listener name=\"http-listener-2\" /network-listener name=\"http-listener-2\" address=\"0.0.0.0\" /" "$DOMAIN_XML" || true

exec asadmin start-domain -v domain1
EOF
chmod +x /start.sh

EXPOSE 8080
  
  # Kör via sh för att slippa ev. chmod/exec-problem i vissa miljöer
CMD ["sh", "/start.sh"]