<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html" xmlns:ui="http://java.sun.com/jsf/facelets"
>

<h:head>
    <title>JSF start</title>
</h:head>

<h:body>
    <h1>#{helloBean.message} </h1>

    <ui:repeat value="#{helloBean.messages}" var="message">
        <p>#{message.message}</p>
    </ui:repeat>
</h:body>

</html>
